<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>小黑 ERP</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        color: #151515;
        background: #fffaf0;
      }

      .shell {
        padding: 14px;
      }

      .panel {
        overflow: hidden;
        border: 2px solid #151515;
        background: #fffaf0;
        box-shadow: 5px 5px 0 #151515;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px;
        border-bottom: 2px solid #151515;
        background: #ffdf57;
      }

      .eyebrow {
        font-size: 10px;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
      }

      h1 {
        margin: 5px 0 0;
        font-size: 18px;
        line-height: 1.1;
        font-weight: 900;
      }

      .body {
        display: grid;
        gap: 10px;
        padding: 12px;
      }

      .status-card {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 9px;
        align-items: center;
        min-height: 46px;
        padding: 9px;
        border: 2px solid #151515;
        background: #ffffff;
      }

      .dot {
        width: 10px;
        height: 10px;
        border: 2px solid #151515;
        background: #9ca3af;
      }

      .status-card[data-mode="success"] .dot {
        background: #22c55e;
      }

      .status-card[data-mode="error"] .dot {
        background: #ef4444;
      }

      .status-card[data-mode="warn"] .dot {
        background: #facc15;
      }

      .label {
        font-size: 12px;
        font-weight: 900;
      }

      .sub {
        margin-top: 2px;
        color: #525252;
        font-size: 11px;
        line-height: 1.25;
      }

      .badge {
        min-width: 48px;
        padding: 4px 6px;
        border: 2px solid #151515;
        background: #f3f4f6;
        text-align: center;
        font-size: 11px;
        font-weight: 900;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      button {
        min-height: 36px;
        border: 2px solid #151515;
        border-radius: 0;
        padding: 8px 9px;
        color: #151515;
        background: #ffffff;
        box-shadow: 3px 3px 0 #151515;
        font-size: 12px;
        font-weight: 900;
        cursor: pointer;
      }

      button:hover {
        transform: translate(1px, 1px);
        box-shadow: 2px 2px 0 #151515;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .primary {
        background: #111827;
        color: #ffffff;
      }

      .status {
        min-height: 34px;
        border-top: 2px solid #151515;
        padding: 9px 12px;
        color: #525252;
        background: #ffffff;
        font-size: 12px;
        line-height: 1.45;
      }

      .status[data-mode="success"] {
        color: #047857;
      }

      .status[data-mode="error"] {
        color: #b91c1c;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel" aria-label="小黑 ERP 插件">
        <header class="header">
          <div>
            <div class="eyebrow">Xiaohei ERP</div>
            <h1>插件状态</h1>
          </div>
        </header>

        <div class="body">
          <article class="status-card" id="erpCard" data-mode="warn">
            <span class="dot" aria-hidden="true"></span>
            <div>
              <div class="label">ERP 登录状态</div>
              <div class="sub" id="erpText">检测中</div>
            </div>
            <div class="badge" id="erpBadge">检测</div>
          </article>

          <article class="status-card" id="sellerCard" data-mode="warn">
            <span class="dot" aria-hidden="true"></span>
            <div>
              <div class="label">Takealot Seller</div>
              <div class="sub" id="sellerText">检测中</div>
            </div>
            <div class="badge" id="sellerBadge">检测</div>
          </article>

          <div class="actions">
            <button class="primary" id="refreshButton" type="button">刷新状态</button>
            <button id="openSellerButton" type="button">打开 Seller</button>
            <button id="openErpButton" type="button">打开 ERP</button>
            <button id="logoutButton" type="button">断开 ERP</button>
          </div>
        </div>

        <div class="status" id="status"></div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
