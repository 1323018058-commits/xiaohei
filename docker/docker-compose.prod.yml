# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  backend:
    volumes: !override
      # Remove dev bind-mount, use baked-in code
      - backend_output:/app/output
    environment:
      - ENVIRONMENT=production

  celery-worker-default:
    volumes: !override
      - backend_output:/app/output
    environment:
      - ENVIRONMENT=production

  celery-worker-sync:
    volumes: !override
      - backend_output:/app/output
    environment:
      - ENVIRONMENT=production

  celery-worker-repricing:
    volumes: !override
      - backend_output:/app/output
    environment:
      - ENVIRONMENT=production

  celery-worker-listing:
    volumes: !override
      - backend_output:/app/output
    environment:
      - ENVIRONMENT=production

  celery-beat:
    volumes: !override []
    environment:
      - ENVIRONMENT=production
      - PROFITLENS_DATA_KEY=${PROFITLENS_DATA_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}

  celery-flower:
    # Restrict Flower access in production
    ports: !override []
    volumes: !override []
    environment:
      - ENVIRONMENT=production
      - PROFITLENS_DATA_KEY=${PROFITLENS_DATA_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}

  nginx:
    depends_on:
      - backend
    volumes: !override
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - nginx_certs:/etc/nginx/certs
