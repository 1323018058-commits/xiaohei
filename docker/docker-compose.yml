services:
  postgres:
    image: docker.1ms.run/library/postgres:16-alpine
    container_name: profitlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: profitlens
      POSTGRES_USER: profitlens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-profitlens_dev_2024}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profitlens -d profitlens"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: docker.1ms.run/library/redis:7-alpine
    container_name: profitlens-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: profitlens-backend
    restart: unless-stopped
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers ${UVICORN_WORKERS:-4}
      --loop uvloop
      --http httptools
      --log-level info
      --timeout-keep-alive 65
      --limit-concurrency 500
      --backlog 4096
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - DATABASE_URL=postgresql+asyncpg://profitlens:${POSTGRES_PASSWORD:-profitlens_dev_2024}@postgres:5432/profitlens
      - DATABASE_URL_SYNC=postgresql+psycopg2://profitlens:${POSTGRES_PASSWORD:-profitlens_dev_2024}@postgres:5432/profitlens
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PROFITLENS_DATA_KEY=${PROFITLENS_DATA_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-ProfitLens ERP}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-true}
      - EMAIL_CODE_EXPIRE_MINUTES=${EMAIL_CODE_EXPIRE_MINUTES:-10}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AMAZON_886IT_API_KEY=${AMAZON_886IT_API_KEY:-}
    volumes:
      - ../backend:/app
      - backend_output:/app/output

  celery-worker-default:
    build:
      context: ../backend
      dockerfile: ../docker/celery.Dockerfile
    container_name: profitlens-celery-default
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app worker
      -Q default,snapshot,scrape
      --concurrency=${CELERY_DEFAULT_CONCURRENCY:-4}
      --loglevel=info
      --max-tasks-per-child=1000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://profitlens:${POSTGRES_PASSWORD:-profitlens_dev_2024}@postgres:5432/profitlens
      - DATABASE_URL_SYNC=postgresql+psycopg2://profitlens:${POSTGRES_PASSWORD:-profitlens_dev_2024}@postgres:5432/profitlens
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PROFITLENS_DATA_KEY=${PROFITLENS_DATA_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AMAZON_886IT_API_KEY=${AMAZON_886IT_API_KEY:-}
    volumes:
      - ../backend:/app
      - backend_output:/app/output

  celery-worker-sync:
    build:
      context: ../backend
      dockerfile: ../docker/celery.Dockerfile
    container_name: profitlens-celery-sync
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app worker
      -Q sync
      --concurrency=${CELERY_SYNC_CONCURRENCY:-2}
      --loglevel=info
      --max-tasks-per-child=1000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://profitlens:${POSTGRES_PASSWORD:-profitlens_dev_2024}@postgres:5432/profitlens
      - DATABASE_URL_SYNC=postgresql+psycopg2://profitlens:${POSTGRES_PASSWORD:-profitlens_dev_2024}@postgres:5432/profitlens
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PROFITLENS_DATA_KEY=${PROFITLENS_DATA_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AMAZON_886IT_API_KEY=${AMAZON_886IT_API_KEY:-}
    volumes:
      - ../backend:/app
      - backend_output:/app/output

  celery-worker-repricing:
    build:
      context: ../backend
      dockerfile: ../docker/celery.Dockerfile
    container_name: profitlens-celery-repricing
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app worker
      -Q repricing
      --concurrency=${CELERY_REPRICING_CONCURRENCY:-2}
      --loglevel=info
      --max-tasks-per-child=1000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://profitlens:${POSTGRES_PASSWORD:-profitlens_dev_2024}@postgres:5432/profitlens
      - DATABASE_URL_SYNC=postgresql+psycopg2://profitlens:${POSTGRES_PASSWORD:-profitlens_dev_2024}@postgres:5432/profitlens
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PROFITLENS_DATA_KEY=${PROFITLENS_DATA_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AMAZON_886IT_API_KEY=${AMAZON_886IT_API_KEY:-}
    volumes:
      - ../backend:/app
      - backend_output:/app/output

  celery-worker-listing:
    build:
      context: ../backend
      dockerfile: ../docker/celery.Dockerfile
    container_name: profitlens-celery-listing
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app worker
      -Q listing,dropship
      --concurrency=${CELERY_LISTING_CONCURRENCY:-2}
      --loglevel=info
      --max-tasks-per-child=50
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://profitlens:${POSTGRES_PASSWORD:-profitlens_dev_2024}@postgres:5432/profitlens
      - DATABASE_URL_SYNC=postgresql+psycopg2://profitlens:${POSTGRES_PASSWORD:-profitlens_dev_2024}@postgres:5432/profitlens
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - PROFITLENS_DATA_KEY=${PROFITLENS_DATA_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - AMAZON_886IT_API_KEY=${AMAZON_886IT_API_KEY:-}
    volumes:
      - ../backend:/app
      - backend_output:/app/output

  celery-beat:
    build:
      context: ../backend
      dockerfile: ../docker/celery.Dockerfile
    container_name: profitlens-celery-beat
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ../backend:/app

  celery-flower:
    build:
      context: ../backend
      dockerfile: ../docker/celery.Dockerfile
    container_name: profitlens-celery-flower
    restart: unless-stopped
    command: >
      celery -A app.tasks.celery_app flower
      --port=5555
      --broker_api=redis://redis:6379/1
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes:
      - ../backend:/app

  nginx:
    image: docker.1ms.run/library/nginx:1.27-alpine
    container_name: profitlens-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - nginx_certs:/etc/nginx/certs
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  redisdata:
  backend_output:
  nginx_certs:
