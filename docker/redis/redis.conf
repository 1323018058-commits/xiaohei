# Redis configuration for ProfitLens v3

# Memory management
maxmemory 1gb
maxmemory-policy volatile-lru

# Persistence — AOF for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB snapshots as backup
save 900 1
save 300 10
save 60 10000

# Network
bind 0.0.0.0
protected-mode no
tcp-keepalive 300
timeout 0

# Performance
databases 16
hz 10
